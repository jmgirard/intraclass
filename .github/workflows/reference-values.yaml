# Scheduled oracle / reference-value drift check (CLAUDE_CODE_KICKOFF.md §3).
# Reruns the oracle and simulation tests and fails if any estimator drifts from
# its committed reference values (project/REFERENCES.md). Meaningful once M1's
# estimators exist; until then the guarded oracle tests skip and this passes.
on:
  schedule:
    - cron: "0 6 * * 1" # every Monday 06:00 UTC
  workflow_dispatch:

name: reference-values.yaml

permissions: read-all

jobs:
  reference-values:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::testthat, any::devtools
          needs: check

      - name: Run oracle and simulation tests
        run: |
          Rscript -e 'devtools::load_all(); testthat::test_dir(
            "tests/testthat",
            filter = "icc",
            stop_on_failure = TRUE,
            reporter = "summary"
          )'
        shell: bash
