# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'cairn/**'
      - 'man/**'
      - 'README.md'
      - '**/*.Rmd'
  pull_request:
    paths-ignore:
      - 'cairn/**'
      - 'man/**'
      - 'README.md'
      - '**/*.Rmd'

name: R-CMD-check.yaml

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        # Full 5-config matrix on push to main; slim ubuntu+windows release on
        # PRs (the full matrix still runs post-merge on push). Windows is kept
        # on PRs because some bugs here surface only on Windows CI (M56).
        config: ${{ github.event_name == 'push' && fromJSON('[{"os":"macos-latest","r":"release"},{"os":"windows-latest","r":"release"},{"os":"ubuntu-latest","r":"devel","http-user-agent":"release"},{"os":"ubuntu-latest","r":"release"},{"os":"ubuntu-latest","r":"oldrel-1"}]') || fromJSON('[{"os":"ubuntu-latest","r":"release"},{"os":"windows-latest","r":"release"}]') }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # testthat's parallel worker count (Config/testthat/parallel: true) defaults
      # to 2 regardless of runner cores (testthat:::default_num_cpus); GitHub
      # runners have more. Scale workers to the actual core count so the
      # testthat.R step (the dominant CI cost — M78/D-011) uses the whole runner.
      # getconf is portable across Linux/macOS/Git-Bash; nproc/2 are fallbacks.
      - name: Scale testthat parallel workers to the runner core count
        run: |
          cores=$(getconf _NPROCESSORS_ONLN 2>/dev/null || nproc 2>/dev/null || echo 2)
          echo "TESTTHAT_CPUS=$cores" >> "$GITHUB_ENV"
          echo "testthat parallel workers set to $cores"
        shell: bash

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
