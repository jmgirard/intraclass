# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:

name: lint.yaml

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr, local::.
          needs: lint

      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true

  # D-009 + M74: the references corpus carries two mechanized completeness gates.
  # (D-009) every dated repo-state claim carries an exit-coded settling directive,
  # re-settled here; (M74) every generalizing claim about a source table is
  # classified in the triage ledger, enumeration-completeness gated here. Running
  # both on push/PR means a falsified/unmarked observation or an un-triaged claim
  # reds a check instead of sitting on main unnoticed. R-free (python3 + git only),
  # so the job does not pay the R setup.
  check-references:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check reference-page observations (D-009)
        run: python3 data-raw/check-reference-observations.py

      - name: Self-test the observation checker (vacuity guard)
        run: python3 data-raw/check-reference-observations.py --self-test

      - name: Check generalizing-claim triage completeness (M74)
        run: python3 data-raw/enumerate-generalizing-claims.py --check

      - name: Self-test the generalizing-claim gate (vacuity guard)
        run: python3 data-raw/enumerate-generalizing-claims.py --self-test
