url: https://jmgirard.github.io/intraclass/

template:
  bootstrap: 5

# Articles grouped so the flagship decision guide is featured.
articles:
  - title: Guides
    navbar: ~
    contents:
      - getting-started
      - choosing-an-icc
      - multilevel-designs
      - engines
      - interval-methods
      - d-studies-and-replicates
      - comparison-with-other-packages
  - title: Reference
    navbar: Reference
    contents:
      - glossary

# Reference index: teaching-first — choose a coefficient, then estimate it, then
# project and tidy it. Grouped by role, not milestone (the single `icc()` entry
# now spans the whole family). Every exported topic is listed deliberately (#6).
reference:
  - title: Choosing a coefficient
    desc: >
      An interactive decision helper that recommends which ICC to report and
      emits the exact `icc()` call that computes it — no fitting, teaching-first.
    contents:
      - choose_icc

  - title: Estimating an ICC
    desc: >
      The workhorse. Fit variance components with a modern mixed model and
      compute the intraclass correlation for a stated design: absolute agreement
      vs. consistency, single vs. average, fixed vs. random raters, one-way vs.
      two-way, multilevel (subject vs. cluster level, crossed or nested), and
      incomplete (ragged) data — all with boundary-aware Monte-Carlo confidence
      intervals. The `print()`, `summary()`, `tidy()`, `glance()`, `autoplot()`
      (coefficient forest / variance-component decomposition) and `plot()`
      methods are documented on this page.
    contents:
      - icc

  - title: Decision (D-) studies
    desc: >
      Project a fitted ICC's reliability to other numbers of raters and plot the
      curve, plus its `tidy()`/`glance()`/`autoplot()`/`plot()` methods.
    contents:
      - d_study

  - title: Tidy methods
    desc: >
      Broom generics re-exported so `tidy()` and `glance()` resolve without
      attaching the generics package.
    contents:
      - reexports

  - title: Datasets
    desc: >
      Worked rater-reliability examples used across the docs and vignettes.
    contents:
      - ratings
      - ratings_incomplete

  - title: Package overview
    contents:
      - intraclass-package
