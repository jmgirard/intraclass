url: https://jmgirard.github.io/intraclass/

template:
  bootstrap: 5

# Articles grouped so the flagship decision guide is featured.
articles:
  - title: Guides
    navbar: ~
    contents:
      - getting-started
      - choosing-an-icc
      - advanced

# Reference index grouped by design type; each milestone adds its estimators.
reference:
  - title: Choosing a coefficient
    desc: >
      An interactive decision helper that recommends which ICC to report and
      the exact call that computes it.
    contents:
      - choose_icc

  - title: Two-way random designs
    desc: >
      Absolute-agreement and (later) consistency ICCs for crossed
      subject-by-rater designs.
    contents:
      - icc

  - title: Decision (D-) studies
    desc: >
      Project reliability to other numbers of raters, and plot the curve.
    contents:
      - d_study

  - title: Datasets
    desc: >
      Worked rater-reliability examples used across the docs and vignettes.
    contents:
      - ratings
      - ratings_incomplete
